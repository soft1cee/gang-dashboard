<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gang Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; font-size: 14px; }
        .status-pill { padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
        .status-active { background-color: #ecfdf5; color: #059669; }
        .status-disabled { background-color: #fef2f2; color: #dc2626; }
        th { cursor: pointer; user-select: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="mb-8 flex justify-center"><img src="LGDW.png" alt="Logo" class="h-24 object-contain"></div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-xs text-gray-500 uppercase">สมาชิกทั้งหมด</p>
                <h2 id="countBadge" class="text-xl font-bold">0 สมาชิก</h2>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-xs text-gray-500 uppercase">ปืน Lv.4 ทั้งหมด</p>
                <h2 id="weaponCount" class="text-xl font-bold text-indigo-600">0 กระบอก</h2>
            </div>
            <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                <p class="text-xs text-gray-500 uppercase">อัปเดตล่าสุด</p>
                <h2 id="lastUpdated" class="text-xl font-bold text-gray-700">-</h2>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase" onclick="sortBy('Slot')">Slot ↕</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase" onclick="sortBy('Name')">Name ↕</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Phone</th>
                        <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase" onclick="sortBy('Status')">Status ↕</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Weapons</th>
                    </tr>
                </thead>
                <tbody id="memberList" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT62Jes0pP_ZpmgsNmVMekEJgj_Y-8jnvyb1j7_SjIhcGfyUzgLxCPxbdO-HuR8H4JX1JfT97x6YFAz/pub?output=csv';
        let membersData = [];
        let sortOrder = 1;

        async function init() {
            const response = await fetch(SHEET_URL);
            const csvData = await response.text();
            Papa.parse(csvData, { header: true, skipEmptyLines: true, complete: (results) => {
                membersData = results.data.filter(m => m.Name && m.Name.trim() !== "");
                document.getElementById('lastUpdated').innerText = new Date().toLocaleTimeString('th-TH');
                renderList(membersData);
            }});
        }

        function sortBy(key) {
            sortOrder *= -1;
            membersData.sort((a, b) => {
                let valA = a[key] || '', valB = b[key] || '';
                if (key === 'Slot') return (parseInt(valA) - parseInt(valB)) * sortOrder;
                if (key === 'Status') return (valA === 'Active' ? -1 : 1) * sortOrder;
                return valA.localeCompare(valB) * sortOrder;
            });
            renderList(membersData);
        }

        function renderList(data) {
            const listBody = document.getElementById('memberList');
            document.getElementById('countBadge').innerText = `${data.length} สมาชิก`;
            
            // นับเฉพาะ ปืน Lv.4
            const totalGunLv4 = data.filter(m => m.Revolver && m.Revolver.includes('ปืน Lv.4')).length;
            document.getElementById('weaponCount').innerText = `${totalGunLv4} กระบอก`;

            listBody.innerHTML = data.map((m, index) => {
                const weaponFields = ['Knife', 'Pool cue', 'Revolver', 'Machete'];
                const weaponTags = weaponFields.map(k => m[k] && m[k].trim() !== "" ? `<span class="px-2 py-0.5 rounded-md text-[10px] bg-gray-100 border mr-1">${m[k]}</span>` : '').join('');
                
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 text-sm font-mono text-gray-900">#${m.Slot}</td>
                        <td class="px-6 py-4"><span class="text-sm font-semibold">${m.Name}</span></td>
                        <td class="px-6 py-4 text-sm text-gray-500">${m.Phone || '-'}</td>
                        <td class="px-6 py-4 text-center"><span class="status-pill ${m.Status === 'Active' ? 'status-active' : 'status-disabled'}">${m.Status}</span></td>
                        <td class="px-6 py-4 text-sm"><div class="flex flex-wrap">${weaponTags}</div></td>
                    </tr>
                `;
            }).join('');
        }

        init();
        setInterval(init, 60000); // อัปเดตทุก 1 นาที
    </script>
</body>
</html>
