<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Doowhite The Legend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #1f2937; margin: 0; padding: 0; }
        
        /* สไตล์เดิมของ Dashboard */
        .card { background: #ffffff; border: 1px solid #f3f4f6; }
        .status-pill { padding: 2px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; font-weight: 600; }
        .status-active { background-color: #f0fdf4; color: #166534; }
        .status-disabled { background-color: #fef2f2; color: #991b1b; }
        .dropdown-menu { display: none; position: absolute; right: 0; top: 100%; padding-top: 10px; z-index: 50; }
        .group:hover .dropdown-menu { display: block; }
        .group { position: relative; }

        /* --- สไตล์สำหรับ Splash Screen --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #111827; /* สีพื้นหลังหน้าล็อค (สีเทาเข้มเกือบดำ) */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* ให้อยู่บนสุดทับทุกอย่าง */
            transition: opacity 0.6s ease-out, visibility 0.6s;
        }

        #splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .splash-logo {
            width: 200px; /* ขนาดโลโก้ในหน้า Splash */
            height: auto;
            margin-bottom: 40px;
            animation: pulse 2s infinite; /* ทำให้โลโก้เต้นเบาๆ */
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .continue-btn {
            background-color: #ffffff;
            color: #111827;
            padding: 12px 40px;
            border-radius: 9999px; /* ทำให้ขอบมนเป็นแคปซูล */
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .continue-btn:hover { background-color: #f3f4f6; transform: translateY(-2px); }
        .continue-btn:active { transform: translateY(0); }

        /* ซ่อนเนื้อหาหลักไว้ก่อน */
        #main-content {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease-in;
        }

        #main-content.show {
            display: block;
            opacity: 1;
        }
        
        /* ล็อก Scrollbar เมื่ออยู่หน้า Splash */
        body.no-scroll { overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 no-scroll"> <div id="splash-screen">
        <img src="LGDW.png" alt="Doowhite Legend Logo" class="splash-logo">
        <button id="unlock-btn" class="continue-btn">Continue</button>
    </div>

    <div id="main-content">
        <nav class="bg-white border-b border-gray-100 py-4 mb-8 sticky top-0 z-50">
            <div class="max-w-5xl mx-auto px-6 flex items-center justify-between">
                <img src="LGDW.png" alt="Logo" class="h-8 md:h-10 w-auto object-contain">
                <div class="flex items-center gap-4 md:gap-8">
                    <button onclick="renderList(membersData)" class="text-sm font-medium text-gray-600 hover:text-black transition-colors">Home</button>
                    <div class="group">
                        <button class="text-sm font-medium text-gray-600 hover:text-black flex items-center gap-1">Group House ▾</button>
                        <div class="dropdown-menu">
                            <div class="bg-white border border-gray-100 rounded-xl shadow-xl p-1 w-32" id="houseDropdown"></div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-5xl mx-auto p-4 md:p-12">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-8">
                <div class="card p-4 rounded-2xl"><p class="text-[9px] text-gray-400 uppercase font-semibold">Members</p><h2 id="countBadge" class="text-xl font-light mt-1">0</h2></div>
                <div class="card p-4 rounded-2xl"><p class="text-[9px] text-gray-400 uppercase font-semibold">Lv.4 Guns</p><h2 id="weaponCount" class="text-xl font-light mt-1">0</h2></div>
                <div class="card p-4 rounded-2xl col-span-2 md:col-span-1"><p class="text-[9px] text-gray-400 uppercase font-semibold">Last Update</p><h2 id="lastUpdated" class="text-xl font-light mt-1 text-gray-600">-</h2></div>
            </div>

            <input type="text" id="searchInput" placeholder="Search name..." onkeyup="filterList()" class="w-full mb-6 px-4 py-3 border border-gray-200 rounded-xl text-sm outline-none focus:border-black">

            <div class="card rounded-2xl overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full">
                        <thead>
                            <tr class="text-left text-[9px] text-gray-400 uppercase border-b border-gray-50">
                                <th class="px-4 py-4 cursor-pointer" onclick="sortBy('Slot')">Slot ↕</th>
                                <th class="px-4 py-4 cursor-pointer" onclick="sortBy('Name')">Name ↕</th>
                                <th class="px-4 py-4">Phone</th>
                                <th class="px-4 py-4 text-center cursor-pointer" onclick="sortBy('Status')">Status ↕</th>
                                <th class="px-4 py-4">Weapons</th>
                            </tr>
                        </thead>
                        <tbody id="memberList" class="divide-y divide-gray-50 text-xs md:text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ส่วนควบคุม Splash Screen ---
        document.getElementById('unlock-btn').addEventListener('click', function() {
            const splash = document.getElementById('splash-screen');
            const content = document.getElementById('main-content');
            
            splash.classList.add('hidden'); // ซ่อนหน้าล็อค
            document.body.classList.remove('no-scroll'); // ปลดล็อกการเลื่อนหน้าจอ
            
            // หน่วงเวลาเล็กน้อยให้หน้าหลักแสดงขึ้นมาแบบ Fade in
            setTimeout(() => {
                content.classList.add('show');
            }, 300);
        });

        // --- ส่วนข้อมูล Sheets เดิมของคุณ ---
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT62Jes0pP_ZpmgsNmVMekEJgj_Y-8jnvyb1j7_SjIhcGfyUzgLxCPxbdO-HuR8H4JX1JfT97x6YFAz/pub?output=csv';
        let membersData = [];

        function initMenu() {
            const menu = document.getElementById('houseDropdown');
            menu.innerHTML = ''; // ป้องกันการสร้างปุ่มซ้ำ
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('button');
                btn.className = "block w-full text-left px-4 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg";
                btn.innerText = "House " + i;
                btn.onclick = () => filterByHouse(i.toString());
                menu.appendChild(btn);
            }
        }

        async function init() {
            initMenu();
            const response = await fetch(SHEET_URL);
            const csvData = await response.text();
            Papa.parse(csvData, { header: true, skipEmptyLines: true, complete: (results) => {
                membersData = results.data.filter(m => m.Name && m.Name.trim() !== "");
                document.getElementById('lastUpdated').innerText = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
                renderList(membersData);
            }});
        }

        function filterByHouse(houseValue) {
            renderList(membersData.filter(m => m.HOUSE === houseValue));
        }

        function filterList() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderList(membersData.filter(m => m.Name.toLowerCase().includes(term) || (m.Slot && m.Slot.toString().includes(term))));
        }

        function sortBy(key) {
            membersData.sort((a, b) => (a[key] || '').localeCompare(b[key] || ''));
            renderList(membersData);
        }

        function renderList(data) {
            const listBody = document.getElementById('memberList');
            document.getElementById('countBadge').innerText = data.length;
            document.getElementById('weaponCount').innerText = data.filter(m => m.Status === 'Active' && m.Revolver && m.Revolver.includes('Lv.4')).length;
            
            listBody.innerHTML = data.map((m) => `
                <tr class="hover:bg-gray-50/50">
                    <td class="px-4 py-4 text-gray-500">#${m.Slot}</td>
                    <td class="px-4 py-4 font-medium truncate">${m.Name}</td>
                    <td class="px-4 py-4 text-gray-400">${m.Phone || '-'}</td>
                    <td class="px-4 py-4 text-center"><span class="status-pill ${m.Status === 'Active' ? 'status-active' : 'status-disabled'}">${m.Status}</span></td>
                    <td class="px-4 py-4"><div class="flex flex-wrap gap-1">${['Knife', 'Pool cue', 'Revolver', 'Machete'].map(k => m[k] && m[k].trim() !== "" ? `<span class="px-2 py-0.5 bg-gray-50 text-[9px] rounded border border-gray-100">${m[k]}</span>` : '').join('')}</div></td>
                </tr>
            `).join('');
        }
        init();
    </script>
</body>
</html>
