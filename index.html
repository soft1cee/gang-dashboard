<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gang Member Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; font-size: 14px; }
        .status-pill { padding: 2px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
        .status-active { background-color: #ecfdf5; color: #059669; }
        .status-disabled { background-color: #fef2f2; color: #dc2626; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="mb-8 flex justify-center">
            <img src="image_1c74ff.jpg" alt="Gang Logo" class="h-24 md:h-32 object-contain shadow-sm rounded-lg">
        </div>

        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900">Doowhite Boom Member</h1>
            <div id="countBadge" class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-sm font-semibold">0 สมาชิก</div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Slot</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Phone</th>
                        <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Weapons</th>
                    </tr>
                </thead>
                <tbody id="memberList" class="divide-y divide-gray-100">
                    <tr><td colspan="5" class="px-6 py-10 text-center text-gray-400">กำลังเชื่อมต่อฐานข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT62Jes0pP_ZpmgsNmVMekEJgj_Y-8jnvyb1j7_SjIhcGfyUzgLxCPxbdO-HuR8H4JX1JfT97x6YFAz/pub?output=csv';

        async function init() {
            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();
                Papa.parse(csvData, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => renderList(results.data)
                });
            } catch (err) {
                console.error(err);
                document.getElementById('memberList').innerHTML = `<tr><td colspan="5" class="px-6 py-10 text-center text-red-500">เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>`;
            }
        }

        function renderList(data) {
            const listBody = document.getElementById('memberList');
            const countBadge = document.getElementById('countBadge');
            const colors = ['#6366f1', '#8b5cf6', '#ec4899', '#10b981', '#f59e0b'];

            const validData = data.filter(m => m.Name && m.Name.trim() !== "");
            countBadge.innerText = `${validData.length} สมาชิก`;

            listBody.innerHTML = validData.map((m, index) => {
                const weaponFields = ['Knife', 'Pool cue', 'Revolver', 'Machete'];
                const weaponTags = weaponFields
                    .map(k => m[k] && m[k].trim() !== "" ? `<span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-medium bg-gray-100 text-gray-700 border mr-1 mb-1">${m[k]}</span>` : '')
                    .join('');

                return `
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 text-sm font-mono text-gray-900">#${m.Slot || '-'}</td>
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <div class="avatar mr-3" style="background-color: ${colors[index % colors.length]}">${m.Name.charAt(0)}</div>
                                <span class="text-sm font-semibold text-gray-900">${m.Name}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-500">${m.Phone || '-'}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="status-pill ${m.Status === 'Active' ? 'status-active' : 'status-disabled'}">
                                ${m.Status || '-'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-sm">
                            <div class="flex flex-wrap">${weaponTags || '-'}</div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        init();
        setInterval(init, 30000);
    </script>
</body>
</html>
