<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gang Member Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <style>
        body { 
            font-family: 'Inter', 'Kanit', sans-serif; 
            background-color: #f9fafb; 
            color: #111827; 
        }
        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        .status-pill {
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .status-active { background-color: #ecfdf5; color: #059669; }
        .status-disabled { background-color: #fef2f2; color: #dc2626; }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Gang Members</h1>
                <p class="text-gray-500 text-sm">จัดการและตรวจสอบสถานะสมาชิกในแก๊ง</p>
            </div>
            <div class="bg-indigo-50 px-4 py-2 rounded-lg text-indigo-700 font-semibold border border-indigo-100">
                ทั้งหมด: <span id="memberCount">0</span>
            </div>
        </div>

        <div class="mb-6">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="search" onkeyup="filterMembers()" placeholder="ค้นหาชื่อ, เบอร์โทร หรืออาวุธ..." 
                class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl leading-5 bg-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition duration-150 ease-in-out">
            </div>
        </div>

        <div class="table-container border border-gray-100">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Slot</th>
                            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</th>
                            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider text-center">Status</th>
                            <th class="px-6 py-4 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Weapons</th>
                        </tr>
                    </thead>
                    <tbody id="memberList" class="bg-white divide-y divide-gray-100">
                        </tbody>
                </table>
            </div>
            <div id="loadingState" class="text-center py-10 text-gray-400">
                กำลังโหลดข้อมูล...
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT62Jes0pP_ZpmgsNmVMekEJgj_Y-8jnvyb1j7_SjIhcGfyUzgLxCPxbdO-HuR8H4JX1JfT97x6YFAz/pub?output=csv';
        let membersData = [];
        const colors = ['#10b981', '#6366f1', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];

        async function init() {
            try {
                const response = await fetch(SHEET_URL);
                const csvData = await response.text();
                Papa.parse(csvData, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        membersData = results.data;
                        renderList(membersData);
                        document.getElementById('loadingState').classList.add('hidden');
                    }
                });
            } catch (err) {
                console.error(err);
            }
        }

        function renderList(data) {
            const listBody = document.getElementById('memberList');
            const countEl = document.getElementById('memberCount');
            const validMembers = data.filter(m => m.Name && m.Name.trim() !== "");
            
            countEl.innerText = validMembers.length;
            
            listBody.innerHTML = validMembers.map((m, index) => {
                const isActive = m.Status && m.Status.trim().toLowerCase() === 'active';
                const char = m.Name.charAt(0).toUpperCase();
                const bgColor = colors[index % colors.length];
                
                // จัดการเรื่องอาวุธให้เป็นปุ่มเล็กๆ (Tags)
                const weaponTags = m.Weapons ? m.Weapons.split(',').map(w => 
                    `<span class="inline-flex items-center px-2.5 py-0.5 rounded-md text-xs font-medium bg-gray-100 text-gray-800 mr-2 border border-gray-200">${w.trim()}</span>`
                ).join('') : '<span class="text-gray-300">-</span>';

                return `
                    <tr class="hover:bg-gray-50 transition duration-150">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 font-mono">
                            #${m.Slot || '--'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="avatar flex-shrink-0" style="background-color: ${bgColor}">${char}</div>
                                <div class="ml-4">
                                    <div class="text-sm font-semibold text-gray-900">${m.Name}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${m.Phone || '-'}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-center">
                            <span class="status-pill ${isActive ? 'status-active' : 'status-disabled'}">
                                <span class="w-1.5 h-1.5 rounded-full ${isActive ? 'bg-green-500' : 'bg-red-500'}"></span>
                                ${isActive ? 'Active' : 'Disabled'}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <div class="flex flex-wrap">${weaponTags}</div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function filterMembers() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = membersData.filter(m => 
                (m.Name && m.Name.toLowerCase().includes(query)) || 
                (m.Phone && m.Phone.toLowerCase().includes(query)) ||
                (m.Weapons && m.Weapons.toLowerCase().includes(query)) ||
                (m.Slot && m.Slot.toLowerCase().includes(query))
            );
            renderList(filtered);
        }

        init();
        setInterval(init, 30000);
    </script>
</body>
</html>
