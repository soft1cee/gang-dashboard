<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Doowhite The Legend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #ffffff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.6s ease;
        }
        .splash-logo { width: 220px; height: auto; margin-bottom: 50px; }
        .continue-btn {
            padding: 12px 40px; border: 1px solid #e5e7eb; border-radius: 12px;
            text-transform: uppercase; font-size: 13px; font-weight: 600; cursor: pointer;
            transition: all 0.3s;
        }
        .continue-btn:hover { background-color: #f9fafb; border-color: #000; }
        #splash-screen.hidden { opacity: 0; visibility: hidden; }

        /* Dashboard */
        #main-content { display: none; opacity: 0; transition: opacity 0.6s ease-in; min-height: 100vh; }
        #main-content.show { display: block; opacity: 1; }
        .card-dark { background: #121212; border: 1px solid #1f1f1f; color: #ffffff; }
        .status-pill { padding: 4px 10px; border-radius: 6px; font-size: 10px; text-transform: uppercase; font-weight: 600; }
        .status-active { background-color: #064e3b; color: #34d399; }
        .status-disabled { background-color: #7f1d1d; color: #f87171; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200">

    <div id="splash-screen">
        <img src="Doo_White.png" alt="Logo" class="splash-logo">
        <button id="unlock-btn" class="continue-btn">Continue</button>
    </div>

    <div id="main-content">
        <nav class="bg-[#0a0a0a] border-b border-[#1f1f1f] py-5 sticky top-0 z-50">
            <div class="max-w-5xl mx-auto px-6 flex items-center justify-between">
                <img src="LGDW-W.png" class="h-8 w-auto cursor-pointer" onclick="backToSplash()">
                <div class="flex items-center gap-8">
                    <button onclick="renderList(membersData); document.getElementById('searchInput').value='';" class="text-sm text-gray-400 hover:text-white transition">Home</button>
                    <div class="relative group">
                        <button class="text-sm text-gray-400 hover:text-white">Group House ▾</button>
                        <div class="hidden group-hover:block absolute right-0 top-full pt-3 z-50">
                            <div class="bg-[#121212] border border-[#1f1f1f] rounded-xl shadow-2xl p-2 w-36" id="houseDropdown"></div>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-5xl mx-auto p-6 md:p-12">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-10">
                <div class="card-dark p-6 rounded-2xl"><p class="text-[10px] text-gray-500 uppercase tracking-widest">Members</p><h2 id="countBadge" class="text-3xl font-light mt-2">0</h2></div>
                <div class="card-dark p-6 rounded-2xl"><p class="text-[10px] text-gray-500 uppercase tracking-widest">Lv.4 Guns</p><h2 id="weaponCount" class="text-3xl font-light mt-2">0</h2></div>
                <div class="card-dark p-6 rounded-2xl col-span-2 md:col-span-1"><p class="text-[10px] text-gray-500 uppercase tracking-widest">Last Update</p><h2 id="lastUpdated" class="text-xl font-light mt-2 text-gray-400">-</h2></div>
            </div>

            <input type="text" id="searchInput" placeholder="Search by name or slot..." onkeyup="filterList()" class="w-full mb-8 px-6 py-4 bg-[#121212] border border-[#1f1f1f] rounded-xl text-sm outline-none focus:border-white transition">

            <div class="card-dark rounded-2xl overflow-hidden">
                <table class="min-w-full">
                    <thead class="border-b border-[#1f1f1f]">
                        <tr class="text-left text-[10px] text-gray-500 uppercase tracking-widest select-none">
                            <th class="px-6 py-5 cursor-pointer hover:text-white" onclick="sortBy('Slot')">Slot ↕</th>
                            <th class="px-6 py-5 cursor-pointer hover:text-white" onclick="sortBy('Name')">Name ↕</th>
                            <th class="px-6 py-5">Phone</th>
                            <th class="px-6 py-5 text-center">Status</th>
                            <th class="px-6 py-5">Weapons</th>
                        </tr>
                    </thead>
                    <tbody id="memberList" class="divide-y divide-[#1f1f1f]"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT62Jes0pP_ZpmgsNmVMekEJgj_Y-8jnvyb1j7_SjIhcGfyUzgLxCPxbdO-HuR8H4JX1JfT97x6YFAz/pub?output=csv';
        let membersData = [];
        let sortStates = { Slot: 0, Name: 0 }; // 0: none, 1: asc, -1: desc

        function backToSplash() {
            document.getElementById('splash-screen').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('show');
            setTimeout(() => document.getElementById('main-content').style.display = 'none', 600);
        }

        document.getElementById('unlock-btn').addEventListener('click', () => {
            document.getElementById('splash-screen').classList.add('hidden');
            document.getElementById('main-content').style.display = 'block';
            setTimeout(() => document.getElementById('main-content').classList.add('show'), 50);
        });

        function initMenu() {
            const menu = document.getElementById('houseDropdown');
            for (let i = 1; i <= 6; i++) {
                const btn = document.createElement('button');
                btn.className = "block w-full text-left px-4 py-3 text-sm text-gray-300 hover:bg-[#1f1f1f] rounded-lg transition";
                btn.innerText = "House " + i;
                btn.onclick = () => filterByHouse(i.toString());
                menu.appendChild(btn);
            }
        }

        async function init() {
            initMenu();
            const response = await fetch(SHEET_URL);
            const csvData = await response.text();
            Papa.parse(csvData, { header: true, skipEmptyLines: true, complete: (results) => {
                membersData = results.data.filter(m => m.Name && m.Name.trim() !== "");
                document.getElementById('lastUpdated').innerText = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
                renderList(membersData);
            }});
        }

        function filterByHouse(val) { renderList(membersData.filter(m => m.HOUSE === val)); }
        
        function filterList() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderList(membersData.filter(m => m.Name.toLowerCase().includes(term) || (m.Slot && m.Slot.toString().includes(term))));
        }

        // แก้ไขฟังก์ชันการเรียงลำดับ (Sort)
        function sortBy(key) {
            // สลับสถานะ: 0 -> 1 -> -1 -> 1 ...
            sortStates[key] = sortStates[key] === 1 ? -1 : 1;

            membersData.sort((a, b) => {
                let valA = a[key] || '';
                let valB = b[key] || '';

                if (key === 'Slot') {
                    // เรียงแบบตัวเลข
                    return (parseInt(valA) - parseInt(valB)) * sortStates[key];
                } else {
                    // เรียงแบบตัวอักษร
                    return valA.localeCompare(valB, 'th') * sortStates[key];
                }
            });
            renderList(membersData);
        }

        function renderList(data) {
            const listBody = document.getElementById('memberList');
            document.getElementById('countBadge').innerText = data.length;
            document.getElementById('weaponCount').innerText = data.filter(m => m.Status === 'Active' && m.Revolver && m.Revolver.includes('Lv.4')).length;
            listBody.innerHTML = data.map((m) => `
                <tr class="hover:bg-[#1a1a1a] transition">
                    <td class="px-6 py-4 text-gray-500">#${m.Slot}</td>
                    <td class="px-6 py-4 font-medium">${m.Name}</td>
                    <td class="px-6 py-4 text-gray-500">${m.Phone || '-'}</td>
                    <td class="px-6 py-4 text-center"><span class="status-pill ${m.Status === 'Active' ? 'status-active' : 'status-disabled'}">${m.Status}</span></td>
                    <td class="px-6 py-4"><div class="flex flex-wrap gap-2">${['Knife', 'Pool cue', 'Revolver', 'Machete'].map(k => m[k] && m[k].trim() !== "" ? `<span class="px-3 py-1 bg-[#1a1a1a] text-[10px] rounded border border-[#262626]">${m[k]}</span>` : '').join('')}</div></td>
                </tr>
            `).join('');
        }
        init();
    </script>
</body>
</html>
