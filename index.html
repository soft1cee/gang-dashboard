<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Doowhite The Legend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #1f2937; }
        .card { background: #ffffff; border: 1px solid #f3f4f6; }
        .status-pill { padding: 2px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; font-weight: 600; }
        .status-active { background-color: #f0fdf4; color: #166534; }
        .status-disabled { background-color: #fef2f2; color: #991b1b; }
        @media (max-width: 640px) {
            .responsive-padding { padding-left: 1rem; padding-right: 1rem; }
            .text-3xl { font-size: 1.5rem; }
        }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white border-b border-gray-100 py-4 mb-8 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 flex items-center justify-between">
            <img src="LGDW.png" alt="Logo" class="h-8 md:h-10 w-auto object-contain">
            <div class="flex items-center gap-4 md:gap-8">
                <button onclick="renderList(membersData)" class="text-sm font-medium text-gray-600 hover:text-black transition-colors">Home</button>
                <div class="relative group">
                    <button class="text-sm font-medium text-gray-600 hover:text-black flex items-center gap-1">Group House ▾</button>
                    <div class="absolute right-0 mt-2 w-32 bg-white border border-gray-100 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
                        <div class="p-1">
                            ${[1,2,3,4,5].map(i => `<button onclick="filterByHouse('House ${i}')" class="block w-full text-left px-4 py-2 text-sm text-gray-600 hover:bg-gray-50 rounded-lg">House ${i}</button>`).join('')}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-4 md:p-12 responsive-padding">
        <div class="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-6 mb-8">
            <div class="card p-4 md:p-6 rounded-2xl">
                <p class="text-[9px] text-gray-400 uppercase tracking-widest font-semibold">Members</p>
                <h2 id="countBadge" class="text-xl md:text-3xl font-light mt-1">0</h2>
            </div>
            <div class="card p-4 md:p-6 rounded-2xl">
                <p class="text-[9px] text-gray-400 uppercase tracking-widest font-semibold">Lv.4 Guns</p>
                <h2 id="weaponCount" class="text-xl md:text-3xl font-light mt-1 text-black">0</h2>
            </div>
            <div class="card p-4 md:p-6 rounded-2xl col-span-2 md:col-span-1 flex flex-col justify-between">
                <div class="flex justify-between items-start">
                    <p class="text-[9px] text-gray-400 uppercase tracking-widest font-semibold">Last Update</p>
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                </div>
                <h2 id="lastUpdated" class="text-xl md:text-3xl font-light mt-1 text-gray-600">-</h2>
            </div>
        </div>

        <input type="text" id="searchInput" placeholder="Search name..." onkeyup="filterList()"
               class="w-full mb-6 px-4 py-3 border border-gray-200 rounded-xl outline-none focus:border-black transition-all text-sm">

        <div class="card rounded-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full">
                    <thead>
                        <tr class="text-left text-[9px] md:text-[10px] text-gray-400 uppercase tracking-widest border-b border-gray-50">
                            <th class="px-4 py-4 cursor-pointer" onclick="sortBy('Slot')">Slot ↕</th>
                            <th class="px-4 py-4 cursor-pointer" onclick="sortBy('Name')">Name ↕</th>
                            <th class="px-4 py-4">Phone</th>
                            <th class="px-4 py-4 text-center cursor-pointer" onclick="sortBy('Status')">Status ↕</th>
                            <th class="px-4 py-4">Weapons</th>
                        </tr>
                    </thead>
                    <tbody id="memberList" class="divide-y divide-gray-50 text-xs md:text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT62Jes0pP_ZpmgsNmVMekEJgj_Y-8jnvyb1j7_SjIhcGfyUzgLxCPxbdO-HuR8H4JX1JfT97x6YFAz/pub?output=csv';
        let membersData = [], sortOrder = 1;

        async function init() {
            const response = await fetch(SHEET_URL);
            const csvData = await response.text();
            Papa.parse(csvData, { header: true, skipEmptyLines: true, complete: (results) => {
                membersData = results.data.filter(m => m.Name && m.Name.trim() !== "");
                document.getElementById('lastUpdated').innerText = new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
                renderList(membersData);
            }});
        }

        function filterByHouse(houseName) {
            renderList(membersData.filter(m => m.House === houseName));
        }

        function filterList() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderList(membersData.filter(m => m.Name.toLowerCase().includes(term) || (m.Slot && m.Slot.toString().includes(term))));
        }

        function sortBy(key) {
            sortOrder *= -1;
            membersData.sort((a, b) => {
                let vA = a[key] || '', vB = b[key] || '';
                if (key === 'Slot') return (parseInt(vA) - parseInt(vB)) * sortOrder;
                if (key === 'Status') return (vA === 'Active' ? -1 : 1) * sortOrder;
                return vA.localeCompare(vB) * sortOrder;
            });
            renderList(membersData);
        }

        function renderList(data) {
            const listBody = document.getElementById('memberList');
            document.getElementById('countBadge').innerText = data.length;
            document.getElementById('weaponCount').innerText = data.filter(m => m.Status === 'Active' && m.Revolver && m.Revolver.includes('ปืน Lv.4')).length;
            listBody.innerHTML = data.map((m) => `
                <tr class="hover:bg-gray-50/50 transition-colors">
                    <td class="px-4 py-4 text-gray-500 font-light">#${m.Slot}</td>
                    <td class="px-4 py-4 font-medium truncate">${m.Name}</td>
                    <td class="px-4 py-4 text-gray-400">${m.Phone || '-'}</td>
                    <td class="px-4 py-4 text-center"><span class="status-pill ${m.Status === 'Active' ? 'status-active' : 'status-disabled'}">${m.Status}</span></td>
                    <td class="px-4 py-4"><div class="flex flex-wrap gap-1">${['Knife', 'Pool cue', 'Revolver', 'Machete'].map(k => m[k] && m[k].trim() !== "" ? `<span class="px-2 py-0.5 bg-gray-50 text-[9px] rounded border border-gray-100 whitespace-nowrap">${m[k]}</span>` : '').join('')}</div></td>
                </tr>
            `).join('');
        }
        init();
        setInterval(init, 60000);
    </script>
</body>
</html>
